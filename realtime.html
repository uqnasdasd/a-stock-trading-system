<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股实时情报站</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
:root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--ink:#e8ecf4;--muted:#6b7a94;--rule:#1e293b;--accent:#ef4444;--accent2:#3b82f6;--green:#22c55e;--gold:#f59e0b;--surface:rgba(255,255,255,0.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border:1px solid var(--rule);border-radius:12px;padding:20px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold),var(--accent2))}
.header h1{font-size:20px;font-weight:700;color:#fff;line-height:1.3}
.header .subtitle{font-size:13px;color:var(--muted);margin-top:6px}
.header-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--muted);margin-top:10px;align-items:center}
.header-meta span{background:var(--surface);padding:3px 10px;border-radius:20px;border:1px solid var(--rule)}
.refresh-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
.refresh-dot.live{background:var(--green)}.refresh-dot.loading{background:var(--gold);animation:none}.refresh-dot.error{background:var(--accent);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.score-bar{display:flex;align-items:center;gap:12px;margin-top:12px;padding:10px 14px;background:var(--surface);border-radius:8px;border:1px solid var(--rule)}
.score-label{font-size:12px;color:var(--muted)}
.score-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;position:relative}
.score-fill{position:absolute;top:0;bottom:0;border-radius:3px;transition:all .5s}
.score-value{font-size:16px;font-weight:800;min-width:50px;text-align:right}
.section{background:var(--bg2);border:1px solid var(--rule);border-radius:12px;padding:20px;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:16px;padding-left:12px;border-left:3px solid var(--accent);display:flex;align-items:center;gap:8px}
.section-title.blue{border-left-color:var(--accent2)}.section-title.gold{border-left-color:var(--gold)}.section-title.green{border-left-color:var(--green)}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.card{background:var(--bg3);border:1px solid var(--rule);border-radius:10px;padding:14px;position:relative;overflow:hidden;transition:background .3s}
.card.flash{background:rgba(255,255,255,0.08)}
.card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px}
.card.red::before{background:var(--accent)}.card.blue::before{background:var(--accent2)}.card.green::before{background:var(--green)}.card.gold::before{background:var(--gold)}
.card-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.card-value{font-size:22px;font-weight:900;line-height:1.2;transition:color .3s}
.card-value.red{color:var(--accent)}.card-value.blue{color:var(--accent2)}.card-value.green{color:var(--green)}.card-value.gold{color:var(--gold)}
.card-note{font-size:11px;color:var(--muted);margin-top:4px}
.sentiment-box{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.sent-item{text-align:center;background:var(--surface);border-radius:8px;padding:10px 12px;flex:1;min-width:70px}
.sent-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.sent-val{font-size:18px;font-weight:800}
.sent-val.red{color:var(--accent)}.sent-val.green{color:var(--green)}.sent-val.blue{color:var(--accent2)}.sent-val.gold{color:var(--gold)}
.logic-item{display:flex;gap:12px;margin-bottom:14px;padding:14px;background:var(--surface);border-radius:10px;border:1px solid var(--rule)}
.logic-num{width:28px;height:28px;min-width:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.logic-num.blue{background:var(--accent2)}.logic-num.green{background:var(--green)}.logic-num.gold{background:var(--gold)}
.logic-content h3{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.logic-content p{font-size:12px;color:var(--muted);line-height:1.6}
.signal-table{width:100%;border-collapse:collapse;font-size:12px}
.signal-table th{background:var(--bg3);padding:10px 8px;text-align:left;font-weight:600;color:var(--muted);font-size:11px;border-bottom:1px solid var(--rule)}
.signal-table td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--ink)}
.signal-table tr:hover{background:var(--surface)}
.signal-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.signal-badge.red{background:rgba(239,68,68,0.15);color:#fca5a5}.signal-badge.green{background:rgba(34,197,94,0.15);color:#86efac}
.signal-badge.gold{background:rgba(245,158,11,0.15);color:#fcd34d}.signal-badge.blue{background:rgba(59,130,246,0.15);color:#93c5fd}
.up{color:var(--accent)}.down{color:var(--green)}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--muted)}
.countdown{font-size:11px;color:var(--muted);margin-left:auto}
.empty-msg{text-align:center;padding:20px;color:var(--muted);font-size:13px}
@media(max-width:600px){.cards{grid-template-columns:1fr}.container{padding:10px}.header h1{font-size:17px}.card-value{font-size:18px}.section{padding:14px}.sent-item{min-width:60px;padding:8px}.sent-val{font-size:15px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="title">A股实时情报站</h1>
    <div class="subtitle" id="subtitle">加载中...</div>
    <div class="header-meta">
      <span id="time"><span class="refresh-dot loading"></span>连接中</span>
      <span id="sentiment-tag">情绪: --</span>
      <span>数据: 新浪/东财</span>
      <span class="countdown" id="countdown"></span>
    </div>
    <div class="score-bar">
      <span class="score-label">多空评分</span>
      <div class="score-track"><div class="score-fill" id="score-fill"></div></div>
      <span class="score-value" id="score-value">--</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">📊 实时行情</div>
    <div class="cards" id="index-cards"></div>
    <div class="sentiment-box" id="sentiment-box"></div>
  </div>

  <div class="section">
    <div class="section-title gold">🔥 行业板块</div>
    <div class="cards" id="sector-cards"></div>
  </div>

  <div class="section">
    <div class="section-title blue">→ 市场逻辑链</div>
    <div id="logics"><div class="empty-msg">分析报告加载中...</div></div>
  </div>

  <div class="section">
    <div class="section-title green">🎯 交易信号</div>
    <table class="signal-table">
      <thead><tr><th>信号</th><th>方向</th><th>板块/标的</th><th>逻辑</th><th>置信度</th></tr></thead>
      <tbody id="signals"><tr><td colspan="5" class="empty-msg">分析报告加载中...</td></tr></tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-title">📈 涨停榜 (<span id="zt-count">0</span>只)</div>
    <table class="signal-table">
      <thead><tr><th>股票</th><th>价格</th><th>涨幅</th><th>封单</th></tr></thead>
      <tbody id="zt-list"><tr><td colspan="4" class="empty-msg">加载中...</td></tr></tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-title red">📉 跌停榜 (<span id="dt-count">0</span>只)</div>
    <table class="signal-table">
      <thead><tr><th>股票</th><th>价格</th><th>跌幅</th></tr></thead>
      <tbody id="dt-list"><tr><td colspan="3" class="empty-msg">加载中...</td></tr></tbody>
    </table>
  </div>

  <div class="footer">
    <p>A股实时情报站 v4.0 · 指数/板块/涨跌停实时刷新 · 分析报告定时更新</p>
    <p>数据: 新浪行情 / 东方财富 · 仅供参考，不构成投资建议</p>
  </div>
</div>

<script>
(function(){
  // ===== 配置 =====
  var INDEX_INTERVAL = 10;   // 指数刷新（秒）
  var SECTOR_INTERVAL = 15;  // 板块刷新（秒）
  var ZT_INTERVAL = 30;       // 涨跌停刷新（秒）
  var REPORT_INTERVAL = 60;   // 分析报告刷新（秒）
  var REPORT_URL = 'data.json';

  var idxCD = 0, secCD = 0, ztCD = 0, rptCD = 0;
  var prevPrices = {};
  var lastReport = null;

  // ===== 工具 =====
  function c(v){return v>0?'green':v<0?'red':'blue'}
  function s(v){return v>=0?'+':''}
  function f(v,d){return v!=null?v.toFixed(d||2):'--'}

  // ===== 1. 指数行情（新浪JSONP，10秒）=====
  var IDX_CODES = {
    'sh000001':'上证指数','sz399001':'深证成指','sz399006':'创业板指',
    'sh000300':'沪深300','sh000905':'中证500'
  };

  function fetchIndices(){
    var sc = document.createElement('script');
    sc.id = 'idx_js';
    var old = document.getElementById('idx_js');
    if(old) old.remove();
    sc.src = 'https://hq.sinajs.cn/list='+Object.keys(IDX_CODES).join(',')+'&_='+Date.now();
    sc.charset = 'gb2312';
    sc.onload = parseIndices;
    sc.onerror = function(){setDot('idx-dot','error')};
    document.head.appendChild(sc);
  }

  function parseIndices(){
    var html = '', items = [];
    for(var code in IDX_CODES){
      var name = IDX_CODES[code];
      var raw;
      try{ raw = eval('hq_str_'+code); }catch(e){ continue; }
      if(!raw) continue;
      var v = raw.split(',');
      if(v.length<5) continue;
      var price = parseFloat(v[3]), pre = parseFloat(v[2]);
      var chg = pre ? (price-pre)/pre*100 : 0;
      var vol = parseFloat(v[8])||0;
      var prev = prevPrices[code];
      var flash = (prev!=null && prev!==price) ? ' flash' : '';
      prevPrices[code] = price;
      var cl = c(chg);
      html += '<div class="card '+cl+flash+'"><div class="card-label">'+name+'</div>'
        +'<div class="card-value '+cl+'">'+f(price)+'</div>'
        +'<div class="card-note">'+s(chg)+f(chg)+'% · '+f(vol/1e8,0)+'亿</div></div>';
      items.push({name:name,chg:chg});
    }
    document.getElementById('index-cards').innerHTML = html;

    // 情绪概览
    var sentHtml = '';
    for(var i=0;i<items.length;i++){
      sentHtml += '<div class="sent-item"><div class="sent-label">'+items[i].name+'</div>'
        +'<div class="sent-val '+c(items[i].chg)+'">'+s(items[i].chg)+f(items[i].chg)+'%</div></div>';
    }
    // 涨跌停数
    var ztC = lastReport ? (lastReport.limit_up_count||0) : '--';
    var dtC = lastReport ? (lastReport.limit_down_count||0) : '--';
    sentHtml += '<div class="sent-item"><div class="sent-label">涨停/跌停</div>'
      +'<div class="sent-val blue">'+ztC+'/'+dtC+'</div></div>';
    document.getElementById('sentiment-box').innerHTML = sentHtml;

    // 更新时间
    var now = new Date();
    var ts = now.getFullYear()+'-'+p2(now.getMonth()+1)+'-'+p2(now.getDate())+' '+p2(now.getHours())+':'+p2(now.getMinutes())+':'+p2(now.getSeconds());
    setDot('idx-dot','live');
    document.getElementById('time').innerHTML = '<span class="refresh-dot live" id="idx-dot"></span>'+ts;
    idxCD = INDEX_INTERVAL;
  }

  // ===== 2. 行业板块（新浪JSONP，15秒）=====
  var SEC_CODES = {
    'sh000037':'上证医药','sh000038':'上证金融',
    'sh000039':'上证信息','sh000040':'上证电信',
    'sh000041':'上证公用'
  };

  function fetchSectors(){
    var sc = document.createElement('script');
    sc.id = 'sec_js';
    var old = document.getElementById('sec_js');
    if(old) old.remove();
    sc.src = 'https://hq.sinajs.cn/list='+Object.keys(SEC_CODES).join(',')+'&_='+Date.now();
    sc.charset = 'gb2312';
    sc.onload = parseSectors;
    sc.onerror = function(){};
    document.head.appendChild(sc);
  }

  function parseSectors(){
    var html = '';
    var sorted = [];
    for(var code in SEC_CODES){
      var name = SEC_CODES[code];
      var raw;
      try{ raw = eval('hq_str_'+code); }catch(e){ continue; }
      if(!raw) continue;
      var v = raw.split(',');
      if(v.length<5) continue;
      var price = parseFloat(v[3]), pre = parseFloat(v[2]);
      var chg = pre ? (price-pre)/pre*100 : 0;
      var vol = parseFloat(v[8])||0;
      sorted.push({name:name,chg:chg,vol:vol});
    }
    sorted.sort(function(a,b){return b.chg-a.chg});
    for(var i=0;i<sorted.length;i++){
      var it = sorted[i], cl = c(it.chg);
      html += '<div class="card '+cl+'"><div class="card-label">'+it.name+'</div>'
        +'<div class="card-value '+cl+'">'+s(it.chg)+f(it.chg)+'%</div>'
        +'<div class="card-note">成交'+f(it.vol/1e8,1)+'亿</div></div>';
    }
    if(!html) html = '<div class="empty-msg">板块数据加载中</div>';
    document.getElementById('sector-cards').innerHTML = html;
    secCD = SECTOR_INTERVAL;
  }

  // ===== 3. 涨跌停（JSONP代理，30秒）=====
  function fetchZT(){
    var today = new Date();
    var dateStr = today.getFullYear()+p2(today.getMonth()+1)+p2(today.getDate());
    var sc = document.createElement('script');
    sc.id = 'zt_js';
    var old = document.getElementById('zt_js');
    if(old) old.remove();
    // 使用JSONP方式调用东方财富涨停池接口
    sc.src = 'https://push2ex.eastmoney.com/getTopicZTPool?ut=7eea3edcaed734bea9cbfc24409ed989&dpt=wz.ztzt&Pageindex=0&pagesize=20&sort=fbt%3Aasc&date='+dateStr+'&callback=handleZT&_='+Date.now();
    sc.charset = 'utf-8';
    sc.onerror = function(){ ztCD = ZT_INTERVAL; };
    document.head.appendChild(sc);
  }

  function fetchDT(){
    var today = new Date();
    var dateStr = today.getFullYear()+p2(today.getMonth()+1)+p2(today.getDate());
    var sc = document.createElement('script');
    sc.id = 'dt_js';
    var old = document.getElementById('dt_js');
    if(old) old.remove();
    sc.src = 'https://push2ex.eastmoney.com/getTopicZTPool?ut=7eea3edcaed734bea9cbfc24409ed989&dpt=wz.zdt&Pageindex=0&pagesize=10&sort=fbt%3Aasc&date='+dateStr+'&callback=handleDT&_='+Date.now();
    sc.charset = 'utf-8';
    sc.onerror = function(){ ztCD = ZT_INTERVAL; };
    document.head.appendChild(sc);
  }

  // JSONP回调（全局函数）
  window.handleZT = function(data){
    try{
      var pool = [];
      if(data && data.data && typeof data.data === 'object'){
        pool = data.data.pool || [];
      }
      document.getElementById('zt-count').textContent = pool.length;
      var html = '';
      for(var i=0;i<Math.min(pool.length,15);i++){
        var s = pool[i];
        var price = (s.p||0)/100;
        var zdp = s.zdp||0;
        var amt = s.amount||0;
        html += '<tr><td>'+escHtml(s.n||'')+'</td><td>'+f(price)+'</td>'
          +'<td class="up">+'+f(zdp)+'%</td>'
          +'<td>'+f(amt/10000,0)+'万</td></tr>';
      }
      if(!html) html = '<tr><td colspan="4" class="empty-msg">暂无涨停数据</td></tr>';
      document.getElementById('zt-list').innerHTML = html;
    }catch(e){ console.error('涨停解析失败:',e); }
    ztCD = ZT_INTERVAL;
  };

  window.handleDT = function(data){
    try{
      var pool = [];
      if(data && data.data && typeof data.data === 'object'){
        pool = data.data.pool || [];
      }
      document.getElementById('dt-count').textContent = pool.length;
      var html = '';
      for(var i=0;i<Math.min(pool.length,10);i++){
        var s = pool[i];
        var price = (s.p||0)/100;
        var zdp = s.zdp||0;
        html += '<tr><td>'+escHtml(s.n||'')+'</td><td>'+f(price)+'</td>'
          +'<td class="down">'+f(zdp)+'%</td></tr>';
      }
      if(!html) html = '<tr><td colspan="3" class="empty-msg">暂无跌停数据</td></tr>';
      document.getElementById('dt-list').innerHTML = html;
    }catch(e){ console.error('跌停解析失败:',e); }
  };

  // ===== 4. 分析报告（data.json，60秒）=====
  function fetchReport(){
    try{
      var xhr = new XMLHttpRequest();
      xhr.open('GET', REPORT_URL+'?t='+Date.now());
      xhr.timeout = 8000;
      xhr.onload = function(){
        if(xhr.status===200){
          try{
            var data = JSON.parse(xhr.responseText);
            lastReport = data;
            renderReport(data);
          }catch(e){ console.error('报告解析失败:',e); }
        }
        rptCD = REPORT_INTERVAL;
      };
      xhr.onerror = function(){ rptCD = 30; };
      xhr.ontimeout = function(){ rptCD = 30; };
      xhr.send();
    }catch(e){ rptCD = 30; }
  }

  function renderReport(d){
    // 标题和情绪
    document.getElementById('title').textContent = d.title || 'A股实时情报站';
    document.getElementById('subtitle').textContent = d.sentiment_detail || '';
    document.getElementById('sentiment-tag').textContent = '情绪: '+(d.sentiment||'--');

    // 评分
    var score = d.score||0;
    var sc = score>20?'green':score<-20?'red':'blue';
    var emoji = score>20?'🟢':score<-20?'🔴':'⚪';
    var fill = document.getElementById('score-fill');
    if(score>0){fill.style.left='50%';fill.style.right='auto';fill.style.width=Math.min(score,100)/2+'%';}
    else{fill.style.right='50%';fill.style.left='auto';fill.style.width=Math.min(Math.abs(score),100)/2+'%';}
    fill.className='score-fill '+sc;
    var sv=document.getElementById('score-value');sv.textContent=emoji+' '+score.toFixed(0);sv.className='score-value '+sc;

    // 逻辑链
    var lh='';
    (d.logics||[]).forEach(function(l){
      lh+='<div class="logic-item"><div class="logic-num '+l.color+'">'+l.num+'</div>'
        +'<div class="logic-content"><h3>'+l.title+'</h3><p>'+l.content+'</p></div></div>';
    });
    document.getElementById('logics').innerHTML = lh||'<div class="empty-msg">暂无分析</div>';

    // 信号
    var sh='';
    (d.signals||[]).forEach(function(sig){
      sh+='<tr><td><strong>'+sig.name+'</strong></td>'
        +'<td><span class="signal-badge '+sig.badge+'">'+sig.direction+'</span></td>'
        +'<td>'+sig.target+'</td><td>'+sig.logic+'</td>'
        +'<td><span class="signal-badge '+sig.conf_badge+'">'+sig.confidence+'</span></td></tr>';
    });
    document.getElementById('signals').innerHTML = sh||'<tr><td colspan="5" class="empty-msg">暂无信号</td></tr>';

    // 更新涨跌停数
    var ztEl=document.getElementById('zt-count');
    var dtEl=document.getElementById('dt-count');
    if(d.limit_up_count!=null) ztEl.textContent=d.limit_up_count;
    if(d.limit_down_count!=null) dtEl.textContent=d.limit_down_count;
  }

  // ===== 工具函数 =====
  function p2(n){return n<10?'0'+n:''+n}
  function setDot(id,cls){var el=document.getElementById(id);if(el)el.className='refresh-dot '+cls;}
  function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // ===== 主循环 =====
  setInterval(function(){
    idxCD--; if(idxCD<=0) fetchIndices();
    secCD--; if(secCD<=0) fetchSectors();
    ztCD--; if(ztCD<=0){ fetchZT(); fetchDT(); }
    rptCD--; if(rptCD<=0) fetchReport();

    var parts = [];
    if(idxCD>0) parts.push('指数'+idxCD+'s');
    if(secCD>0) parts.push('板块'+secCD+'s');
    if(ztCD>0) parts.push('涨跌停'+ztCD+'s');
    if(rptCD>0) parts.push('报告'+rptCD+'s');
    document.getElementById('countdown').textContent = parts.join(' · ');
  }, 1000);

  // 首次加载
  fetchIndices();
  fetchSectors();
  fetchZT();
  fetchDT();
  fetchReport();
})();
</script>
</body>
</html>
